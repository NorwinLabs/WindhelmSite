<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Windhelm</title>
    <link rel="icon" href="media/favicon.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
      }

      .stars {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s infinite;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      .container {
        text-align: center;
        z-index: 10;
        padding: 2rem;
        max-width: 600px;
      }

      .logo {
        width: 200px;
        height: auto;
        margin-bottom: 2rem;
        filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.5));
      }

      h1 {
        font-size: 8rem;
        font-weight: 900;
        background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
        line-height: 1;
      }

      h2 {
        font-size: 2rem;
        margin-bottom: 1rem;
        font-weight: 700;
      }

      p {
        font-size: 1.2rem;
        color: #cbd5e1;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      .buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-block;
        padding: 1rem 2rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .btn-primary {
        background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
      }

      .floating {
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
      }

      @media (max-width: 768px) {
        h1 { font-size: 5rem; }
        h2 { font-size: 1.5rem; }
        p { font-size: 1rem; }
        .logo { width: 150px; }
        .buttons { flex-direction: column; }
        .btn { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Starfield background -->
    <div class="stars" id="stars"></div>

    <div class="container">
      <img src="media/Logo.webp" alt="Windhelm" class="logo floating" />
      <h1>404</h1>
      <h2>Lost in the Wilderness</h2>
      <p>
        The path you seek does not exist in this realm. Perhaps it was claimed by
        the ancient forces, or maybe it never existed at all...
      </p>
      <div class="buttons">
        <a href="/" class="btn btn-primary">Return Home</a>
        <a href="https://store.steampowered.com/app/2171040/Windhelm/" 
           class="btn btn-secondary" 
           target="_blank" 
           rel="noopener noreferrer">
          Wishlist on Steam
        </a>
      </div>
    </div>

    <script>
      // Generate random stars
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(star);
      }
    </script>
  </body>
</html>
